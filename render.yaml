# Render Blueprint — one-click deploy of AQYL CITY.
#
# Stack:
#   1. PostgreSQL (free, with PostGIS extension auto-created at backend startup)
#   2. Backend FastAPI (Python, Docker)
#   3. Frontend (static React/Vite SPA — no plan needed; static sites are free)
#
# Usage:
#   1) Push this repo to GitHub.
#   2) Render Dashboard → "New" → "Blueprint" → connect repo.
#   3) Render reads this file, provisions all 3 services automatically.
#   4) Add OPENAI_API_KEY env to backend service after first deploy if you want LLM.
#
# Notes:
#   - Free Postgres on Render expires after 90 days; consider upgrading or
#     migrating to Neon (also free + бессрочно) before that.
#   - Free Web Service sleeps after 15 min idle (~30 sec cold start).
#     Setup UptimeRobot ping on /health to keep it warm.

databases:
  - name: aqyl-postgres
    plan: free
    databaseName: almaty_analytics
    user: aqyl
    postgresMajorVersion: "16"

services:
  # ----- BACKEND (FastAPI in Docker) ----------------------------------
  - type: web
    name: aqyl-api
    runtime: docker
    plan: free
    region: frankfurt
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aqyl-postgres
          property: connectionString
      - key: CORS_ORIGINS
        # Will be set to actual frontend URL after first deploy.
        # Manually adjust in Dashboard → aqyl-api → Environment if needed.
        value: https://aqyl-web.onrender.com,http://localhost:5173
      - key: OPENAI_API_KEY
        sync: false             # set manually in dashboard
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: EGOV_API_KEY
        sync: false
      - key: PYTHONUNBUFFERED
        value: "1"

  # ----- FRONTEND (static SPA) ----------------------------------------
  # Note: static sites do NOT accept a `plan` field — they are always free.
  - type: web
    name: aqyl-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        # Backend public URL — Render auto-fills via the linked service.
        fromService:
          type: web
          name: aqyl-api
          property: host          # → aqyl-api-xxx.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
